<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calcula tu Departamento{% endblock %}</title>
    <style>
        :root {
            --color-primary: {{ config.form_color_primario|default:"#5D1314" }};
            --color-secondary: {{ config.form_color_secundario|default:"#A2998F" }};
            --color-fondo: {{ config.form_color_fondo|default:"#FDEFD6" }};
            --color-califica: {{ config.form_color_califica|default:"#16a34a" }};
            --color-no-califica: {{ config.form_color_no_califica|default:"#dc2626" }};
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #2b2b2b;
            line-height: 1.55;
        }
        .container { max-width: 980px; margin: 0 auto; padding: 24px 18px; }

        .calc-header h1 {
            font-size: 1.6rem; font-weight: 800; letter-spacing: .3px;
            color: var(--color-primary); text-transform: uppercase;
        }
        .calc-header p { color: #6b6b6b; font-size: .92rem; margin-top: 6px; max-width: 760px; }

        .step {
            background: var(--color-fondo);
            border-radius: 10px;
            padding: 22px 24px;
            margin-top: 18px;
        }
        .step-eyebrow {
            color: var(--color-primary); font-weight: 700; font-size: .8rem;
            text-transform: capitalize; letter-spacing: .4px;
        }
        .step-title { font-size: 1.25rem; font-weight: 800; color: #1f2937; margin-top: 2px; }
        .step-help { color: #7a7a7a; font-size: .82rem; margin-top: 4px; }
        .step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        @media (max-width: 720px) { .step-grid { grid-template-columns: 1fr; } }

        .form-group { margin-top: 14px; }
        .form-group > label {
            display: block; font-weight: 600; font-size: .82rem;
            color: #4a4a4a; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid #e0d8cd;
            border-radius: 8px; font-size: .98rem; transition: border-color .2s, box-shadow .2s;
            background: #fff;
        }
        .form-input:focus {
            outline: none; border-color: var(--color-primary);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 18%, transparent);
        }
        .input-money { position: relative; }
        .input-money .peso { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-primary); font-weight: 800; }
        .input-money .form-input { padding-left: 30px; }

        .inline-renta { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-top: 14px; }
        .inline-renta .q { color: #6b6b6b; font-weight: 600; font-size: .85rem; }
        .radio-row { display: flex; gap: 14px; }
        .radio-row label { display: flex; align-items: center; gap: 5px; font-size: .85rem; cursor: pointer; }

        .btn-submit {
            display: block; width: 100%; max-width: 320px; margin: 26px auto 0;
            padding: 14px; background: var(--color-primary);
            color: #fff; border: none; border-radius: 8px; font-size: 1.02rem;
            font-weight: 700; cursor: pointer; transition: opacity .2s;
        }
        .btn-submit:hover { opacity: .92; }
        .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

        .section-title {
            font-size: .95rem; font-weight: 800; color: var(--color-primary);
            margin: 8px 0 0;
        }

        /* Preview en vivo del precio máximo */
        .live-precio {
            text-align: center; padding: 22px; margin-top: 18px;
            border: 2px dashed var(--color-secondary); border-radius: 10px;
        }
        .live-precio .lbl { color: #6b6b6b; font-size: .9rem; }
        .live-precio .uf { font-size: 2rem; font-weight: 800; color: var(--color-primary); }
        .live-precio .clp { font-size: 1.05rem; color: #4a4a4a; }

        /* Tabla de resultados */
        .result-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: .92rem; }
        .result-table th, .result-table td { padding: 11px 12px; text-align: right; border-bottom: 1px solid #ece4d8; }
        .result-table th { background: var(--color-primary); color: #fff; font-weight: 700; }
        .result-table td:first-child, .result-table th:first-child { text-align: left; }
        .result-table tr:last-child td { font-weight: 700; }
        .result-note { font-size: .76rem; color: #8a8a8a; margin-top: 12px; line-height: 1.5; }

        .felicidades {
            text-align: center; margin: 28px 0 8px; color: var(--color-primary);
            font-weight: 800; font-size: 1.15rem; text-transform: uppercase;
        }

        /* Grilla de propiedades */
        .grid-props { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 16px; }
        @media (max-width: 860px) { .grid-props { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .grid-props { grid-template-columns: 1fr; } }
        .prop-card {
            border: 1px solid #ece4d8; border-radius: 10px; overflow: hidden;
            background: #fff; display: flex; flex-direction: column;
        }
        .prop-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; background: #f1ebe2; display: block; }
        .prop-noimg { width: 100%; aspect-ratio: 1 / 1; display:flex; align-items:center; justify-content:center; text-align:center; padding:8px; background: var(--color-fondo); color: var(--color-secondary); font-weight:700; }
        .prop-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
        .prop-edificio { font-weight: 800; color: #1f2937; font-size: .98rem; }
        .prop-tipo { color: var(--color-primary); font-weight: 700; font-size: .85rem; margin-top: 2px; }
        .prop-comuna { color: #8a8a8a; font-size: .8rem; margin-top: 2px; }
        .prop-data { margin-top: 10px; font-size: .82rem; color: #555; }
        .prop-data .row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed #efe8dd; }
        .prop-precio { margin-top: 10px; font-weight: 800; color: var(--color-primary); font-size: 1.05rem; }
        .prop-btn {
            display: block; text-align: center; margin-top: 12px; padding: 10px;
            background: var(--color-primary); color: #fff; text-decoration: none;
            border-radius: 8px; font-weight: 700; font-size: .9rem;
        }
        .prop-btn:hover { opacity: .92; }

        .errorlist { list-style: none; color: var(--color-no-califica); font-size: .78rem; margin-top: 4px; }
        .field-error .form-input { border-color: var(--color-no-califica); }
        .required { color: var(--color-no-califica); }
        [x-cloak] { display: none !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
